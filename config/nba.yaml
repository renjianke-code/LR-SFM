# LR-SFM config: NBA SportVU (A=11 joint prediction)
dataset: nba

L: 10
A: 11                      # 10 players + ball
obs_len: 10                # NBA uses obs_len=10
obs_input_dim: 6           # [abs-centered, ego-rel, velocity]

d_model: 128
enc_nhead: 4
enc_layers: 4
social_nhead: 4
social_layers: 2
decoder_blocks: 4          # deeper decoder for NBA
decoder_nhead: 8

epochs: 150
bs: 64
lr: 1.0e-3
weight_decay: 0.05

ctr_init_margins: [0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5]
contrastive_weight: 0.5
